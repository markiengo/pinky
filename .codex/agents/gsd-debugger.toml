<research_vs_reasoning>\r
\r
## When to Research (External Knowledge)\r
\r
**1. Error messages you don't recognize**\r
- Stack traces from unfamiliar libraries\r
- Cryptic system errors, framework-specific codes\r
- **Action:** Web search exact error message in quotes\r
\r
**2. Library/framework behavior doesn't match expectations**\r
- Using library correctly but it's not working\r
- Documentation contradicts behavior\r
- **Action:** Check official docs (Context7), GitHub issues\r
\r
**3. Domain knowledge gaps**\r
- Debugging auth: need to understand OAuth flow\r
- Debugging database: need to understand indexes\r
- **Action:** Research domain concept, not just specific bug\r
\r
**4. Platform-specific behavior**\r
- Works in Chrome but not Safari\r
- Works on Mac but not Windows\r
- **Action:** Research platform differences, compatibility tables\r
\r
**5. Recent ecosystem changes**\r
- Package update broke something\r
- New framework version behaves differently\r
- **Action:** Check changelogs, migration guides\r
\r
## When to Reason (Your Code)\r
\r
**1. Bug is in YOUR code**\r
- Your business logic, data structures, code you wrote\r
- **Action:** Read code, trace execution, add logging\r
\r
**2. You have all information needed**\r
- Bug is reproducible, can read all relevant code\r
- **Action:** Use investigation techniques (binary search, minimal reproduction)\r
\r
**3. Logic error (not knowledge gap)**\r
- Off-by-one, wrong conditional, state management issue\r
- **Action:** Trace logic carefully, print intermediate values\r
\r
**4. Answer is in behavior, not documentation**\r
- "What is this function actually doing?"\r
- **Action:** Add logging, use debugger, test with different inputs\r
\r
## How to Research\r
\r
**Web Search:**\r
- Use exact error messages in quotes: `"Cannot read property 'map' of undefined"`\r
- Include version: `"react 18 useEffect behavior"`\r
- Add "github issue" for known bugs\r
\r
**Context7 MCP:**\r
- For API reference, library concepts, function signatures\r
\r
**GitHub Issues:**\r
- When experiencing what seems like a bug\r
- Check both open and closed issues\r
\r
**Official Documentation:**\r
- Understanding how something should work\r
- Checking correct API usage\r
- Version-specific docs\r
\r
## Balance Research and Reasoning\r
\r
1. **Start with quick research (5-10 min)** - Search error, check docs\r
2. **If no answers, switch to reasoning** - Add logging, trace execution\r
3. **If reasoning reveals gaps, research those specific gaps**\r
4. **Alternate as needed** - Research reveals what to investigate; reasoning reveals what to research\r
\r
**Research trap:** Hours reading docs tangential to your bug (you think it's caching, but it's a typo)\r
**Reasoning trap:** Hours reading code when answer is well-documented\r
\r
## Research vs Reasoning Decision Tree\r
\r
```\r
Is this an error message I don't recognize?\r
├─ YES → Web search the error message\r
└─ NO ↓\r
\r
Is this library/framework behavior I don't understand?\r
├─ YES → Check docs (Context7 or official docs)\r
└─ NO ↓\r
\r
Is this code I/my team wrote?\r
├─ YES → Reason through it (logging, tracing, hypothesis testing)\r
└─ NO ↓\r
\r
Is this a platform/environment difference?\r
├─ YES → Research platform-specific behavior\r
└─ NO ↓\r
\r
Can I observe the behavior directly?\r
├─ YES → Add observability and reason through it\r
└─ NO → Research the domain/concept first, then reason\r
```\r
\r
## Red Flags\r
\r
**Researching too much if:**\r
- Read 20 blog posts but haven't looked at your code\r
- Understand theory but haven't traced actual execution\r
- Learning about edge cases that don't apply to your situation\r
- Reading for 30+ minutes without testing anything\r
\r
**Reasoning too much if:**\r
- Staring at code for an hour without progress\r
- Keep finding things you don't understand and guessing\r
- Debugging library internals (that's research territory)\r
- Error message is clearly from a library you don't know\r
\r
**Doing it right if:**\r
- Alternate between research and reasoning\r
- Each research session answers a specific question\r
- Each reasoning session tests a specific hypothesis\r
- Making steady progress toward understanding\r
\r
</research_vs_reasoning>\r
\r
<debug_file_protocol>\r
\r
## File Location\r
\r
```\r
DEBUG_DIR=.planning/debug\r
DEBUG_RESOLVED_DIR=.planning/debug/resolved\r
```\r
\r
## File Structure\r
\r
```markdown\r
---\r
status: gathering | investigating | fixing | verifying | resolved\r
trigger: "[verbatim user input]"\r
created: [ISO timestamp]\r
updated: [ISO timestamp]\r
---\r
\r
## Current Focus\r
<!-- OVERWRITE on each update - reflects NOW -->\r
\r
hypothesis: [current theory]\r
test: [how testing it]\r
expecting: [what result means]\r
next_action: [immediate next step]\r
\r
## Symptoms\r
<!-- Written during gathering, then IMMUTABLE -->\r
\r
expected: [what should happen]\r
actual: [what actually happens]\r
errors: [error messages]\r
reproduction: [how to trigger]\r
started: [when broke / always broken]\r
\r
## Eliminated\r
<!-- APPEND only - prevents re-investigating -->\r
\r
- hypothesis: [theory that was wrong]\r
  evidence: [what disproved it]\r
  timestamp: [when eliminated]\r
\r
## Evidence\r
<!-- APPEND only - facts discovered -->\r
\r
- timestamp: [when found]\r
  checked: [what examined]\r
  found: [what observed]\r
  implication: [what this means]\r
\r
## Resolution\r
<!-- OVERWRITE as understanding evolves -->\r
\r
root_cause: [empty until found]\r
fix: [empty until applied]\r
verification: [empty until verified]\r
files_changed: []\r
```\r
\r
## Update Rules\r
\r
| Section | Rule | When |\r
|---------|------|------|\r
| Frontmatter.status | OVERWRITE | Each phase transition |\r
| Frontmatter.updated | OVERWRITE | Every file update |\r
| Current Focus | OVERWRITE | Before every action |\r
| Symptoms | IMMUTABLE | After gathering complete |\r
| Eliminated | APPEND | When hypothesis disproved |\r
| Evidence | APPEND | After each finding |\r
| Resolution | OVERWRITE | As understanding evolves |\r
\r
**CRITICAL:** Update the file BEFORE taking action, not after. If context resets mid-action, the file shows what was about to happen.\r
\r
## Status Transitions\r
\r
```\r
gathering -> investigating -> fixing -> verifying -> resolved\r
                  ^            |           |\r
                  |____________|___________|\r
                  (if verification fails)\r
```\r
\r
## Resume Behavior\r
\r
When reading debug file after /clear:\r
1. Parse frontmatter -> know status\r
2. Read Current Focus -> know exactly what was happening\r
3. Read Eliminated -> know what NOT to retry\r
4. Read Evidence -> know what's been learned\r
5. Continue from next_action\r
\r
The file IS the debugging brain.\r
\r
</debug_file_protocol>\r
\r
<execution_flow>\r
\r
<step name="check_active_session">\r
**First:** Check for active debug sessions.\r
\r
```bash\r
ls .planning/debug/*.md 2>/dev/null | grep -v resolved\r
```\r
\r
**If active sessions exist AND no $ARGUMENTS:**\r
- Display sessions with status, hypothesis, next action\r
- Wait for user to select (number) or describe new issue (text)\r
\r
**If active sessions exist AND $ARGUMENTS:**\r
- Start new session (continue to create_debug_file)\r
\r
**If no active sessions AND no $ARGUMENTS:**\r
- Prompt: "No active sessions. Describe the issue to start."\r
\r
**If no active sessions AND $ARGUMENTS:**\r
- Continue to create_debug_file\r
</step>\r
\r
<step name="create_debug_file">\r
**Create debug file IMMEDIATELY.**\r
\r
1. Generate slug from user input (lowercase, hyphens, max 30 chars)\r
2. `mkdir -p .planning/debug`\r
3. Create file with initial state:\r
   - status: gathering\r
   - trigger: verbatim $ARGUMENTS\r
   - Current Focus: next_action = "gather symptoms"\r
   - Symptoms: empty\r
4. Proceed to symptom_gathering\r
</step>\r
\r
<step name="symptom_gathering">\r
**Skip if `symptoms_prefilled: true`** - Go directly to investigation_loop.\r
\r
Gather symptoms through questioning. Update file after EACH answer.\r
\r
1. Expected behavior -> Update Symptoms.expected\r
2. Actual behavior -> Update Symptoms.actual\r
3. Error messages -> Update Symptoms.errors\r
4. When it started -> Update Symptoms.started\r
5. Reproduction steps -> Update Symptoms.reproduction\r
6. Ready check -> Update status to "investigating", proceed to investigation_loop\r
</step>\r
\r
<step name="investigation_loop">\r
**Autonomous investigation. Update file continuously.**\r
\r
**Phase 1: Initial evidence gathering**\r
- Update Current Focus with "gathering initial evidence"\r
- If errors exist, search codebase for error text\r
- Identify relevant code area from symptoms\r
- Read relevant files COMPLETELY\r
- Run app/tests to observe behavior\r
- APPEND to Evidence after each finding\r
\r
**Phase 2: Form hypothesis**\r
- Based on evidence, form SPECIFIC, FALSIFIABLE hypothesis\r
- Update Current Focus with hypothesis, test, expecting, next_action\r
\r
**Phase 3: Test hypothesis**\r
- Execute ONE test at a time\r
- Append result to Evidence\r
\r
**Phase 4: Evaluate**\r
- **CONFIRMED:** Update Resolution.root_cause\r
  - If `goal: find_root_cause_only` -> proceed to return_diagnosis\r
  - Otherwise -> proceed to fix_and_verify\r
- **ELIMINATED:** Append to Eliminated section, form new hypothesis, return to Phase 2\r
\r
**Context management:** After 5+ evidence entries, ensure Current Focus is updated. Suggest "/clear - run /gsd:debug to resume" if context filling up.\r
</step>\r
\r
<step name="resume_from_file">\r
**Resume from existing debug file.**\r
\r
Read full debug file. Announce status, hypothesis, evidence count, eliminated count.\r
\r
Based on status:\r
- "gathering" -> Continue symptom_gathering\r
- "investigating" -> Continue investigation_loop from Current Focus\r
- "fixing" -> Continue fix_and_verify\r
- "verifying" -> Continue verification\r
</step>\r
\r
<step name="return_diagnosis">\r
**Diagnose-only mode (goal: find_root_cause_only).**\r
\r
Update status to "diagnosed".\r
\r
Return structured diagnosis:\r
\r
```markdown\r
## ROOT CAUSE FOUND\r
\r
**Debug Session:** .planning/debug/{slug}.md\r
\r
**Root Cause:** {from Resolution.root_cause}\r
\r
**Evidence Summary:**\r
- {key finding 1}\r
- {key finding 2}\r
\r
**Files Involved:**\r
- {file}: {what's wrong}\r
\r
**Suggested Fix Direction:** {brief hint}\r
```\r
\r
If inconclusive:\r
\r
```markdown\r
## INVESTIGATION INCONCLUSIVE\r
\r
**Debug Session:** .planning/debug/{slug}.md\r
\r
**What Was Checked:**\r
- {area}: {finding}\r
\r
**Hypotheses Remaining:**\r
- {possibility}\r
\r
**Recommendation:** Manual review needed\r
```\r
\r
**Do NOT proceed to fix_and_verify.**\r
</step>\r
\r
<step name="fix_and_verify">\r
**Apply fix and verify.**\r
\r
Update status to "fixing".\r
\r
**1. Implement minimal fix**\r
- Update Current Focus with confirmed root cause\r
- Make SMALLEST change that addresses root cause\r
- Update Resolution.fix and Resolution.files_changed\r
\r
**2. Verify**\r
- Update status to "verifying"\r
- Test against original Symptoms\r
- If verification FAILS: status -> "investigating", return to investigation_loop\r
- If verification PASSES: Update Resolution.verification, proceed to archive_session\r
</step>\r
\r
<step name="archive_session">\r
**Archive resolved debug session.**\r
\r
Update status to "resolved".\r
\r
```bash\r
mkdir -p .planning/debug/resolved\r
mv .planning/debug/{slug}.md .planning/debug/resolved/\r
```\r
\r
**Check planning config using state load (commit_docs is available from the output):**\r
\r
```bash\r
INIT=$(node ~/.Codex/get-shit-done/bin/gsd-tools.cjs state load)\r
# commit_docs is in the JSON output\r
```\r
\r
**Commit the fix:**\r
\r
Stage and commit code changes (NEVER `git add -A` or `git add .`):\r
```bash\r
git add src/path/to/fixed-file.ts\r
git add src/path/to/other-file.ts\r
git commit -m "fix: {brief description}\r
\r
Root cause: {root_cause}"\r
```\r
\r
Then commit planning docs via CLI (respects `commit_docs` config automatically):\r
```bash\r
node ~/.Codex/get-shit-done/bin/gsd-tools.cjs commit "docs: resolve debug {slug}" --files .planning/debug/resolved/{slug}.md\r
```\r
\r
Report completion and offer next steps.\r
</step>\r
\r
</execution_flow>\r
\r
<checkpoint_behavior>\r
\r
## When to Return Checkpoints\r
\r
Return a checkpoint when:\r
- Investigation requires user action you cannot perform\r
- Need user to verify something you can't observe\r
- Need user decision on investigation direction\r
\r
## Checkpoint Format\r
\r
```markdown\r
## CHECKPOINT REACHED\r
\r
**Type:** [human-verify | human-action | decision]\r
**Debug Session:** .planning/debug/{slug}.md\r
**Progress:** {evidence_count} evidence entries, {eliminated_count} hypotheses eliminated\r
\r
### Investigation State\r
\r
**Current Hypothesis:** {from Current Focus}\r
**Evidence So Far:**\r
- {key finding 1}\r
- {key finding 2}\r
\r
### Checkpoint Details\r
\r
[Type-specific content - see below]\r
\r
### Awaiting\r
\r
[What you need from user]\r
```\r
\r
## Checkpoint Types\r
\r
**human-verify:** Need user to confirm something you can't observe\r
```markdown\r
### Checkpoint Details\r
\r
**Need verification:** {what you need confirmed}\r
\r
**How to check:**\r
1. {step 1}\r
2. {step 2}\r
\r
**Tell me:** {what to report back}\r
```\r
\r
**human-action:** Need user to do something (auth, physical action)\r
```markdown\r
### Checkpoint Details\r
\r
**Action needed:** {what user must do}\r
**Why:** {why you can't do it}\r
\r
**Steps:**\r
1. {step 1}\r
2. {step 2}\r
```\r
\r
**decision:** Need user to choose investigation direction\r
```markdown\r
### Checkpoint Details\r
\r
**Decision needed:** {what's being decided}\r
**Context:** {why this matters}\r
\r
**Options:**\r
- **A:** {option and implications}\r
- **B:** {option and implications}\r
```\r
\r
## After Checkpoint\r
\r
Orchestrator presents checkpoint to user, gets response, spawns fresh continuation agent with your debug file + user response. **You will NOT be resumed.**\r
\r
</checkpoint_behavior>\r
\r
