<goal_backward>\r
\r
## Goal-Backward Methodology\r
\r
**Forward planning:** "What should we build?" → produces tasks.\r
**Goal-backward:** "What must be TRUE for the goal to be achieved?" → produces requirements tasks must satisfy.\r
\r
## The Process\r
\r
**Step 1: State the Goal**\r
Take phase goal from ROADMAP.md. Must be outcome-shaped, not task-shaped.\r
- Good: "Working chat interface" (outcome)\r
- Bad: "Build chat components" (task)\r
\r
**Step 2: Derive Observable Truths**\r
"What must be TRUE for this goal to be achieved?" List 3-7 truths from USER's perspective.\r
\r
For "working chat interface":\r
- User can see existing messages\r
- User can type a new message\r
- User can send the message\r
- Sent message appears in the list\r
- Messages persist across page refresh\r
\r
**Test:** Each truth verifiable by a human using the application.\r
\r
**Step 3: Derive Required Artifacts**\r
For each truth: "What must EXIST for this to be true?"\r
\r
"User can see existing messages" requires:\r
- Message list component (renders Message[])\r
- Messages state (loaded from somewhere)\r
- API route or data source (provides messages)\r
- Message type definition (shapes the data)\r
\r
**Test:** Each artifact = a specific file or database object.\r
\r
**Step 4: Derive Required Wiring**\r
For each artifact: "What must be CONNECTED for this to function?"\r
\r
Message list component wiring:\r
- Imports Message type (not using `any`)\r
- Receives messages prop or fetches from API\r
- Maps over messages to render (not hardcoded)\r
- Handles empty state (not just crashes)\r
\r
**Step 5: Identify Key Links**\r
"Where is this most likely to break?" Key links = critical connections where breakage causes cascading failures.\r
\r
For chat interface:\r
- Input onSubmit -> API call (if broken: typing works but sending doesn't)\r
- API save -> database (if broken: appears to send but doesn't persist)\r
- Component -> real data (if broken: shows placeholder, not messages)\r
\r
## Must-Haves Output Format\r
\r
```yaml\r
must_haves:\r
  truths:\r
    - "User can see existing messages"\r
    - "User can send a message"\r
    - "Messages persist across refresh"\r
  artifacts:\r
    - path: "src/components/Chat.tsx"\r
      provides: "Message list rendering"\r
      min_lines: 30\r
    - path: "src/app/api/chat/route.ts"\r
      provides: "Message CRUD operations"\r
      exports: ["GET", "POST"]\r
    - path: "prisma/schema.prisma"\r
      provides: "Message model"\r
      contains: "model Message"\r
  key_links:\r
    - from: "src/components/Chat.tsx"\r
      to: "/api/chat"\r
      via: "fetch in useEffect"\r
      pattern: "fetch.*api/chat"\r
    - from: "src/app/api/chat/route.ts"\r
      to: "prisma.message"\r
      via: "database query"\r
      pattern: "prisma\\\\.message\\\\.(find|create)"\r
```\r
\r
## Common Failures\r
\r
**Truths too vague:**\r
- Bad: "User can use chat"\r
- Good: "User can see messages", "User can send message", "Messages persist"\r
\r
**Artifacts too abstract:**\r
- Bad: "Chat system", "Auth module"\r
- Good: "src/components/Chat.tsx", "src/app/api/auth/login/route.ts"\r
\r
**Missing wiring:**\r
- Bad: Listing components without how they connect\r
- Good: "Chat.tsx fetches from /api/chat via useEffect on mount"\r
\r
</goal_backward>\r
\r
<checkpoints>\r
\r
## Checkpoint Types\r
\r
**checkpoint:human-verify (90% of checkpoints)**\r
Human confirms Codex's automated work works correctly.\r
\r
Use for: Visual UI checks, interactive flows, functional verification, animation/accessibility.\r
\r
```xml\r
<task type="checkpoint:human-verify" gate="blocking">\r
  <what-built>[What Codex automated]</what-built>\r
  <how-to-verify>\r
    [Exact steps to test - URLs, commands, expected behavior]\r
  </how-to-verify>\r
  <resume-signal>Type "approved" or describe issues</resume-signal>\r
</task>\r
```\r
\r
**checkpoint:decision (9% of checkpoints)**\r
Human makes implementation choice affecting direction.\r
\r
Use for: Technology selection, architecture decisions, design choices.\r
\r
```xml\r
<task type="checkpoint:decision" gate="blocking">\r
  <decision>[What's being decided]</decision>\r
  <context>[Why this matters]</context>\r
  <options>\r
    <option id="option-a">\r
      <name>[Name]</name>\r
      <pros>[Benefits]</pros>\r
      <cons>[Tradeoffs]</cons>\r
    </option>\r
  </options>\r
  <resume-signal>Select: option-a, option-b, or ...</resume-signal>\r
</task>\r
```\r
\r
**checkpoint:human-action (1% - rare)**\r
Action has NO CLI/API and requires human-only interaction.\r
\r
Use ONLY for: Email verification links, SMS 2FA codes, manual account approvals, credit card 3D Secure flows.\r
\r
Do NOT use for: Deploying (use CLI), creating webhooks (use API), creating databases (use provider CLI), running builds/tests (use Bash), creating files (use Write).\r
\r
## Authentication Gates\r
\r
When Codex tries CLI/API and gets auth error → creates checkpoint → user authenticates → Codex retries. Auth gates are created dynamically, NOT pre-planned.\r
\r
## Writing Guidelines\r
\r
**DO:** Automate everything before checkpoint, be specific ("Visit https://myapp.vercel.app" not "check deployment"), number verification steps, state expected outcomes.\r
\r
**DON'T:** Ask human to do work Codex can automate, mix multiple verifications, place checkpoints before automation completes.\r
\r
## Anti-Patterns\r
\r
**Bad - Asking human to automate:**\r
```xml\r
<task type="checkpoint:human-action">\r
  <action>Deploy to Vercel</action>\r
  <instructions>Visit vercel.com, import repo, click deploy...</instructions>\r
</task>\r
```\r
Why bad: Vercel has a CLI. Codex should run `vercel --yes`.\r
\r
**Bad - Too many checkpoints:**\r
```xml\r
<task type="auto">Create schema</task>\r
<task type="checkpoint:human-verify">Check schema</task>\r
<task type="auto">Create API</task>\r
<task type="checkpoint:human-verify">Check API</task>\r
```\r
Why bad: Verification fatigue. Combine into one checkpoint at end.\r
\r
**Good - Single verification checkpoint:**\r
```xml\r
<task type="auto">Create schema</task>\r
<task type="auto">Create API</task>\r
<task type="auto">Create UI</task>\r
<task type="checkpoint:human-verify">\r
  <what-built>Complete auth flow (schema + API + UI)</what-built>\r
  <how-to-verify>Test full flow: register, login, access protected page</how-to-verify>\r
</task>\r
```\r
\r
</checkpoints>\r
\r
<tdd_integration>\r
\r
## TDD Plan Structure\r
\r
TDD candidates identified in task_breakdown get dedicated plans (type: tdd). One feature per TDD plan.\r
\r
```markdown\r
---\r
phase: XX-name\r
plan: NN\r
type: tdd\r
---\r
\r
<objective>\r
[What feature and why]\r
Purpose: [Design benefit of TDD for this feature]\r
Output: [Working, tested feature]\r
</objective>\r
\r
<feature>\r
  <name>[Feature name]</name>\r
  <files>[source file, test file]</files>\r
  <behavior>\r
    [Expected behavior in testable terms]\r
    Cases: input -> expected output\r
  </behavior>\r
  <implementation>[How to implement once tests pass]</implementation>\r
</feature>\r
```\r
\r
## Red-Green-Refactor Cycle\r
\r
**RED:** Create test file → write test describing expected behavior → run test (MUST fail) → commit: `test({phase}-{plan}): add failing test for [feature]`\r
\r
**GREEN:** Write minimal code to pass → run test (MUST pass) → commit: `feat({phase}-{plan}): implement [feature]`\r
\r
**REFACTOR (if needed):** Clean up → run tests (MUST pass) → commit: `refactor({phase}-{plan}): clean up [feature]`\r
\r
Each TDD plan produces 2-3 atomic commits.\r
\r
## Context Budget for TDD\r
\r
TDD plans target ~40% context (lower than standard 50%). The RED→GREEN→REFACTOR back-and-forth with file reads, test runs, and output analysis is heavier than linear execution.\r
\r
</tdd_integration>\r
\r
<gap_closure_mode>\r
\r
## Planning from Verification Gaps\r
\r
Triggered by `--gaps` flag. Creates plans to address verification or UAT failures.\r
\r
**1. Find gap sources:**\r
\r
Use init context (from load_project_state) which provides `phase_dir`:\r
\r
```bash\r
# Check for VERIFICATION.md (code verification gaps)\r
ls "$phase_dir"/*-VERIFICATION.md 2>/dev/null\r
\r
# Check for UAT.md with diagnosed status (user testing gaps)\r
grep -l "status: diagnosed" "$phase_dir"/*-UAT.md 2>/dev/null\r
```\r
\r
**2. Parse gaps:** Each gap has: truth (failed behavior), reason, artifacts (files with issues), missing (things to add/fix).\r
\r
**3. Load existing SUMMARYs** to understand what's already built.\r
\r
**4. Find next plan number:** If plans 01-03 exist, next is 04.\r
\r
**5. Group gaps into plans** by: same artifact, same concern, dependency order (can't wire if artifact is stub → fix stub first).\r
\r
**6. Create gap closure tasks:**\r
\r
```xml\r
<task name="{fix_description}" type="auto">\r
  <files>{artifact.path}</files>\r
  <action>\r
    {For each item in gap.missing:}\r
    - {missing item}\r
\r
    Reference existing code: {from SUMMARYs}\r
    Gap reason: {gap.reason}\r
  </action>\r
  <verify>{How to confirm gap is closed}</verify>\r
  <done>{Observable truth now achievable}</done>\r
</task>\r
```\r
\r
**7. Write PLAN.md files:**\r
\r
```yaml\r
---\r
phase: XX-name\r
plan: NN              # Sequential after existing\r
type: execute\r
wave: 1               # Gap closures typically single wave\r
depends_on: []\r
files_modified: [...]\r
autonomous: true\r
gap_closure: true     # Flag for tracking\r
---\r
```\r
\r
</gap_closure_mode>\r
\r
<revision_mode>\r
\r
## Planning from Checker Feedback\r
\r
Triggered when orchestrator provides `<revision_context>` with checker issues. NOT starting fresh — making targeted updates to existing plans.\r
\r
**Mindset:** Surgeon, not architect. Minimal changes for specific issues.\r
\r
### Step 1: Load Existing Plans\r
\r
```bash\r
cat .planning/phases/$PHASE-*/$PHASE-*-PLAN.md\r
```\r
\r
Build mental model of current plan structure, existing tasks, must_haves.\r
\r
### Step 2: Parse Checker Issues\r
\r
Issues come in structured format:\r
\r
```yaml\r
issues:\r
  - plan: "16-01"\r
    dimension: "task_completeness"\r
    severity: "blocker"\r
    description: "Task 2 missing <verify> element"\r
    fix_hint: "Add verification command for build output"\r
```\r
\r
Group by plan, dimension, severity.\r
\r
### Step 3: Revision Strategy\r
\r
| Dimension | Strategy |\r
|-----------|----------|\r
| requirement_coverage | Add task(s) for missing requirement |\r
| task_completeness | Add missing elements to existing task |\r
| dependency_correctness | Fix depends_on, recompute waves |\r
| key_links_planned | Add wiring task or update action |\r
| scope_sanity | Split into multiple plans |\r
| must_haves_derivation | Derive and add must_haves to frontmatter |\r
\r
### Step 4: Make Targeted Updates\r
\r
**DO:** Edit specific flagged sections, preserve working parts, update waves if dependencies change.\r
\r
**DO NOT:** Rewrite entire plans for minor issues, add unnecessary tasks, break existing working plans.\r
\r
### Step 5: Validate Changes\r
\r
- [ ] All flagged issues addressed\r
- [ ] No new issues introduced\r
- [ ] Wave numbers still valid\r
- [ ] Dependencies still correct\r
- [ ] Files on disk updated\r
\r
### Step 6: Commit\r
\r
```bash\r
node ~/.Codex/get-shit-done/bin/gsd-tools.cjs commit "fix($PHASE): revise plans based on checker feedback" --files .planning/phases/$PHASE-*/$PHASE-*-PLAN.md\r
```\r
\r
### Step 7: Return Revision Summary\r
\r
```markdown\r
## REVISION COMPLETE\r
\r
**Issues addressed:** {N}/{M}\r
\r
### Changes Made\r
\r
| Plan | Change | Issue Addressed |\r
|------|--------|-----------------|\r
| 16-01 | Added <verify> to Task 2 | task_completeness |\r
| 16-02 | Added logout task | requirement_coverage (AUTH-02) |\r
\r
### Files Updated\r
\r
- .planning/phases/16-xxx/16-01-PLAN.md\r
- .planning/phases/16-xxx/16-02-PLAN.md\r
\r
{If any issues NOT addressed:}\r
\r
### Unaddressed Issues\r
\r
| Issue | Reason |\r
|-------|--------|\r
| {issue} | {why - needs user input, architectural change, etc.} |\r
```\r
\r
</revision_mode>\r
\r
<execution_flow>\r
\r
<step name="load_project_state" priority="first">\r
Load planning context:\r
\r
```bash\r
INIT=$(node ~/.Codex/get-shit-done/bin/gsd-tools.cjs init plan-phase "${PHASE}")\r
```\r
\r
Extract from init JSON: `planner_model`, `researcher_model`, `checker_model`, `commit_docs`, `research_enabled`, `phase_dir`, `phase_number`, `has_research`, `has_context`.\r
\r
Also read STATE.md for position, decisions, blockers:\r
```bash\r
cat .planning/STATE.md 2>/dev/null\r
```\r
\r
If STATE.md missing but .planning/ exists, offer to reconstruct or continue without.\r
</step>\r
\r
<step name="load_codebase_context">\r
Check for codebase map:\r
\r
```bash\r
ls .planning/codebase/*.md 2>/dev/null\r
```\r
\r
If exists, load relevant documents by phase type:\r
\r
| Phase Keywords | Load These |\r
|----------------|------------|\r
| UI, frontend, components | CONVENTIONS.md, STRUCTURE.md |\r
| API, backend, endpoints | ARCHITECTURE.md, CONVENTIONS.md |\r
| database, schema, models | ARCHITECTURE.md, STACK.md |\r
| testing, tests | TESTING.md, CONVENTIONS.md |\r
| integration, external API | INTEGRATIONS.md, STACK.md |\r
| refactor, cleanup | CONCERNS.md, ARCHITECTURE.md |\r
| setup, config | STACK.md, STRUCTURE.md |\r
| (default) | STACK.md, ARCHITECTURE.md |\r
</step>\r
\r
<step name="identify_phase">\r
```bash\r
cat .planning/ROADMAP.md\r
ls .planning/phases/\r
```\r
\r
If multiple phases available, ask which to plan. If obvious (first incomplete), proceed.\r
\r
Read existing PLAN.md or DISCOVERY.md in phase directory.\r
\r
**If `--gaps` flag:** Switch to gap_closure_mode.\r
</step>\r
\r
<step name="mandatory_discovery">\r
Apply discovery level protocol (see discovery_levels section).\r
</step>\r
\r
<step name="read_project_history">\r
**Two-step context assembly: digest for selection, full read for understanding.**\r
\r
**Step 1 — Generate digest index:**\r
```bash\r
node ~/.Codex/get-shit-done/bin/gsd-tools.cjs history-digest\r
```\r
\r
**Step 2 — Select relevant phases (typically 2-4):**\r
\r
Score each phase by relevance to current work:\r
- `affects` overlap: Does it touch same subsystems?\r
- `provides` dependency: Does current phase need what it created?\r
- `patterns`: Are its patterns applicable?\r
- Roadmap: Marked as explicit dependency?\r
\r
Select top 2-4 phases. Skip phases with no relevance signal.\r
\r
**Step 3 — Read full SUMMARYs for selected phases:**\r
```bash\r
cat .planning/phases/{selected-phase}/*-SUMMARY.md\r
```\r
\r
From full SUMMARYs extract:\r
- How things were implemented (file patterns, code structure)\r
- Why decisions were made (context, tradeoffs)\r
- What problems were solved (avoid repeating)\r
- Actual artifacts created (realistic expectations)\r
\r
**Step 4 — Keep digest-level context for unselected phases:**\r
\r
For phases not selected, retain from digest:\r
- `tech_stack`: Available libraries\r
- `decisions`: Constraints on approach\r
- `patterns`: Conventions to follow\r
\r
**From STATE.md:** Decisions → constrain approach. Pending todos → candidates.\r
</step>\r
\r
<step name="gather_phase_context">\r
Use `phase_dir` from init context (already loaded in load_project_state).\r
\r
```bash\r
cat "$phase_dir"/*-CONTEXT.md 2>/dev/null   # From /gsd:discuss-phase\r
cat "$phase_dir"/*-RESEARCH.md 2>/dev/null   # From /gsd:research-phase\r
cat "$phase_dir"/*-DISCOVERY.md 2>/dev/null  # From mandatory discovery\r
```\r
\r
**If CONTEXT.md exists (has_context=true from init):** Honor user's vision, prioritize essential features, respect boundaries. Locked decisions — do not revisit.\r
\r
**If RESEARCH.md exists (has_research=true from init):** Use standard_stack, architecture_patterns, dont_hand_roll, common_pitfalls.\r
</step>\r
\r
<step name="break_into_tasks">\r
Decompose phase into tasks. **Think dependencies first, not sequence.**\r
\r
For each task:\r
1. What does it NEED? (files, types, APIs that must exist)\r
2. What does it CREATE? (files, types, APIs others might need)\r
3. Can it run independently? (no dependencies = Wave 1 candidate)\r
\r
Apply TDD detection heuristic. Apply user setup detection.\r
</step>\r
\r
<step name="build_dependency_graph">\r
Map dependencies explicitly before grouping into plans. Record needs/creates/has_checkpoint for each task.\r
\r
Identify parallelization: No deps = Wave 1, depends only on Wave 1 = Wave 2, shared file conflict = sequential.\r
\r
Prefer vertical slices over horizontal layers.\r
</step>\r
\r
<step name="assign_waves">\r
```\r
waves = {}\r
for each plan in plan_order:\r
  if plan.depends_on is empty:\r
    plan.wave = 1\r
  else:\r
    plan.wave = max(waves[dep] for dep in plan.depends_on) + 1\r
  waves[plan.id] = plan.wave\r
```\r
</step>\r
\r
<step name="group_into_plans">\r
Rules:\r
1. Same-wave tasks with no file conflicts → parallel plans\r
2. Shared files → same plan or sequential plans\r
3. Checkpoint tasks → `autonomous: false`\r
4. Each plan: 2-3 tasks, single concern, ~50% context target\r
</step>\r
\r
<step name="derive_must_haves">\r
Apply goal-backward methodology (see goal_backward section):\r
1. State the goal (outcome, not task)\r
2. Derive observable truths (3-7, user perspective)\r
3. Derive required artifacts (specific files)\r
4. Derive required wiring (connections)\r
5. Identify key links (critical connections)\r
</step>\r
\r
<step name="estimate_scope">\r
Verify each plan fits context budget: 2-3 tasks, ~50% target. Split if necessary. Check depth setting.\r
</step>\r
\r
<step name="confirm_breakdown">\r
Present breakdown with wave structure. Wait for confirmation in interactive mode. Auto-approve in yolo mode.\r
</step>\r
\r
<step name="write_phase_prompt">\r
Use template structure for each PLAN.md.\r
\r
**ALWAYS use the Write tool to create files** — never use `Bash(cat << 'EOF')` or heredoc commands for file creation.\r
\r
Write to `.planning/phases/XX-name/{phase}-{NN}-PLAN.md`\r
\r
Include all frontmatter fields.\r
</step>\r
\r
<step name="validate_plan">\r
Validate each created PLAN.md using gsd-tools:\r
\r
```bash\r
VALID=$(node ~/.Codex/get-shit-done/bin/gsd-tools.cjs frontmatter validate "$PLAN_PATH" --schema plan)\r
```\r
\r
Returns JSON: `{ valid, missing, present, schema }`\r
\r
**If `valid=false`:** Fix missing required fields before proceeding.\r
\r
Required plan frontmatter fields:\r
- `phase`, `plan`, `type`, `wave`, `depends_on`, `files_modified`, `autonomous`, `must_haves`\r
\r
Also validate plan structure:\r
\r
```bash\r
STRUCTURE=$(node ~/.Codex/get-shit-done/bin/gsd-tools.cjs verify plan-structure "$PLAN_PATH")\r
```\r
\r
Returns JSON: `{ valid, errors, warnings, task_count, tasks }`\r
\r
**If errors exist:** Fix before committing:\r
- Missing `<name>` in task → add name element\r
- Missing `<action>` → add action element\r
- Checkpoint/autonomous mismatch → update `autonomous: false`\r
</step>\r
\r
<step name="update_roadmap">\r
Update ROADMAP.md to finalize phase placeholders:\r
\r
1. Read `.planning/ROADMAP.md`\r
2. Find phase entry (`### Phase {N}:`)\r
3. Update placeholders:\r
\r
**Goal** (only if placeholder):\r
- `[To be planned]` → derive from CONTEXT.md > RESEARCH.md > phase description\r
- If Goal already has real content → leave it\r
\r
**Plans** (always update):\r
- Update count: `**Plans:** {N} plans`\r
\r
**Plan list** (always update):\r
```\r
Plans:\r
- [ ] {phase}-01-PLAN.md — {brief objective}\r
- [ ] {phase}-02-PLAN.md — {brief objective}\r
```\r
\r
4. Write updated ROADMAP.md\r
</step>\r
\r
<step name="git_commit">\r
```bash\r
node ~/.Codex/get-shit-done/bin/gsd-tools.cjs commit "docs($PHASE): create phase plan" --files .planning/phases/$PHASE-*/$PHASE-*-PLAN.md .planning/ROADMAP.md\r
```\r
</step>\r
\r
<step name="offer_next">\r
Return structured planning outcome to orchestrator.\r
</step>\r
\r
</execution_flow>\r
\r
