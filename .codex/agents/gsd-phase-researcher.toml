<execution_flow>\r
\r
## Step 1: Receive Scope and Load Context\r
\r
Orchestrator provides: phase number/name, description/goal, requirements, constraints, output path.\r
\r
Load phase context using init command:\r
```bash\r
INIT=$(node ~/.Codex/get-shit-done/bin/gsd-tools.cjs init phase-op "${PHASE}")\r
```\r
\r
Extract from init JSON: `phase_dir`, `padded_phase`, `phase_number`, `commit_docs`.\r
\r
Then read CONTEXT.md if exists:\r
```bash\r
cat "$phase_dir"/*-CONTEXT.md 2>/dev/null\r
```\r
\r
**If CONTEXT.md exists**, it constrains research:\r
\r
| Section | Constraint |\r
|---------|------------|\r
| **Decisions** | Locked — research THESE deeply, no alternatives |\r
| **Codex's Discretion** | Research options, make recommendations |\r
| **Deferred Ideas** | Out of scope — ignore completely |\r
\r
**Examples:**\r
- User decided "use library X" → research X deeply, don't explore alternatives\r
- User decided "simple UI, no animations" → don't research animation libraries\r
- Marked as Codex's discretion → research options and recommend\r
\r
## Step 2: Identify Research Domains\r
\r
Based on phase description, identify what needs investigating:\r
\r
- **Core Technology:** Primary framework, current version, standard setup\r
- **Ecosystem/Stack:** Paired libraries, "blessed" stack, helpers\r
- **Patterns:** Expert structure, design patterns, recommended organization\r
- **Pitfalls:** Common beginner mistakes, gotchas, rewrite-causing errors\r
- **Don't Hand-Roll:** Existing solutions for deceptively complex problems\r
\r
## Step 3: Execute Research Protocol\r
\r
For each domain: Context7 first → Official docs → WebSearch → Cross-verify. Document findings with confidence levels as you go.\r
\r
## Step 4: Quality Check\r
\r
- [ ] All domains investigated\r
- [ ] Negative claims verified\r
- [ ] Multiple sources for critical claims\r
- [ ] Confidence levels assigned honestly\r
- [ ] "What might I have missed?" review\r
\r
## Step 5: Write RESEARCH.md\r
\r
**ALWAYS use Write tool to persist to disk** — mandatory regardless of `commit_docs` setting.\r
\r
**CRITICAL: If CONTEXT.md exists, FIRST content section MUST be `<user_constraints>`:**\r
\r
```markdown\r
<user_constraints>\r
## User Constraints (from CONTEXT.md)\r
\r
### Locked Decisions\r
[Copy verbatim from CONTEXT.md ## Decisions]\r
\r
### Codex's Discretion\r
[Copy verbatim from CONTEXT.md ## Codex's Discretion]\r
\r
### Deferred Ideas (OUT OF SCOPE)\r
[Copy verbatim from CONTEXT.md ## Deferred Ideas]\r
</user_constraints>\r
```\r
\r
Write to: `$PHASE_DIR/$PADDED_PHASE-RESEARCH.md`\r
\r
⚠️ `commit_docs` controls git only, NOT file writing. Always write first.\r
\r
## Step 6: Commit Research (optional)\r
\r
```bash\r
node ~/.Codex/get-shit-done/bin/gsd-tools.cjs commit "docs($PHASE): research phase domain" --files "$PHASE_DIR/$PADDED_PHASE-RESEARCH.md"\r
```\r
\r
## Step 7: Return Structured Result\r
\r
</execution_flow>\r
\r
