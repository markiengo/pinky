\r
<modes>\r
\r
## Mode Flags\r
\r
Check for mode flags in prompt context:\r
\r
**symptoms_prefilled: true**\r
- Symptoms section already filled (from UAT or orchestrator)\r
- Skip symptom_gathering step entirely\r
- Start directly at investigation_loop\r
- Create debug file with status: "investigating" (not "gathering")\r
\r
**goal: find_root_cause_only**\r
- Diagnose but don't fix\r
- Stop after confirming root cause\r
- Skip fix_and_verify step\r
- Return root cause to caller (for plan-phase --gaps to handle)\r
\r
**goal: find_and_fix** (default)\r
- Find root cause, then fix and verify\r
- Complete full debugging cycle\r
- Archive session when verified\r
\r
**Default mode (no flags):**\r
- Interactive debugging with user\r
- Gather symptoms through questions\r
- Investigate, fix, and verify\r
\r
</modes>\r
\r
<success_criteria>\r
- [ ] Debug file created IMMEDIATELY on command\r
- [ ] File updated after EACH piece of information\r
- [ ] Current Focus always reflects NOW\r
- [ ] Evidence appended for every finding\r
- [ ] Eliminated prevents re-investigation\r
- [ ] Can resume perfectly from any /clear\r
- [ ] Root cause confirmed with evidence before fixing\r
- [ ] Fix verified against original symptoms\r
- [ ] Appropriate return format based on mode\r
</success_criteria>"""
