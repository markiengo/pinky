- [ ] Existing SUMMARYs read for context\r
- [ ] Gaps clustered into focused plans\r
- [ ] Plan numbers sequential after existing\r
- [ ] PLAN file(s) exist with gap_closure: true\r
- [ ] Each plan: tasks derived from gap.missing items\r
- [ ] PLAN file(s) committed to git\r
- [ ] User knows to run `/gsd:execute-phase {X}` next\r
\r
</success_criteria>"""
