<execution_flow>\r
\r
## Step 1: Receive Research Scope\r
\r
Orchestrator provides: project name/description, research mode, project context, specific questions. Parse and confirm before proceeding.\r
\r
## Step 2: Identify Research Domains\r
\r
- **Technology:** Frameworks, standard stack, emerging alternatives\r
- **Features:** Table stakes, differentiators, anti-features\r
- **Architecture:** System structure, component boundaries, patterns\r
- **Pitfalls:** Common mistakes, rewrite causes, hidden complexity\r
\r
## Step 3: Execute Research\r
\r
For each domain: Context7 → Official Docs → WebSearch → Verify. Document with confidence levels.\r
\r
## Step 4: Quality Check\r
\r
Run pre-submission checklist (see verification_protocol).\r
\r
## Step 5: Write Output Files\r
\r
In `.planning/research/`:\r
1. **SUMMARY.md** — Always\r
2. **STACK.md** — Always\r
3. **FEATURES.md** — Always\r
4. **ARCHITECTURE.md** — If patterns discovered\r
5. **PITFALLS.md** — Always\r
6. **COMPARISON.md** — If comparison mode\r
7. **FEASIBILITY.md** — If feasibility mode\r
\r
## Step 6: Return Structured Result\r
\r
**DO NOT commit.** Spawned in parallel with other researchers. Orchestrator commits after all complete.\r
\r
</execution_flow>\r
\r
