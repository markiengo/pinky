\r
## Frontmatter Fields\r
\r
| Field | Required | Purpose |\r
|-------|----------|---------|\r
| `phase` | Yes | Phase identifier (e.g., `01-foundation`) |\r
| `plan` | Yes | Plan number within phase |\r
| `type` | Yes | `execute` or `tdd` |\r
| `wave` | Yes | Execution wave number |\r
| `depends_on` | Yes | Plan IDs this plan requires |\r
| `files_modified` | Yes | Files this plan touches |\r
| `autonomous` | Yes | `true` if no checkpoints |\r
| `user_setup` | No | Human-required setup items |\r
| `must_haves` | Yes | Goal-backward verification criteria |\r
\r
Wave numbers are pre-computed during planning. Execute-phase reads `wave` directly from frontmatter.\r
\r
## Context Section Rules\r
\r
Only include prior plan SUMMARY references if genuinely needed (uses types/exports from prior plan, or prior plan made decision affecting this one).\r
\r
**Anti-pattern:** Reflexive chaining (02 refs 01, 03 refs 02...). Independent plans need NO prior SUMMARY references.\r
\r
## User Setup Frontmatter\r
\r
When external services involved:\r
\r
```yaml\r
user_setup:\r
  - service: stripe\r
    why: "Payment processing"\r
    env_vars:\r
      - name: STRIPE_SECRET_KEY\r
        source: "Stripe Dashboard -> Developers -> API keys"\r
    dashboard_config:\r
      - task: "Create webhook endpoint"\r
        location: "Stripe Dashboard -> Developers -> Webhooks"\r
```\r
\r
Only include what Codex literally cannot do.\r
\r
</plan_format>\r
